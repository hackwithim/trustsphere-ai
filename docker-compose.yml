services:
  postgres:
    image: postgres:16-alpine
    container_name: trustsphere-postgres
    environment:
      POSTGRES_USER: trustsphere
      POSTGRES_PASSWORD: trustsphere
      POSTGRES_DB: trustsphere
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustsphere -d trustsphere"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: trustsphere-backend
    environment:
      DATABASE_URL: postgresql+psycopg://trustsphere:trustsphere@postgres:5432/trustsphere
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: trustsphere-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

